name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-binaries:
    name: Build Standalone for ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            arch: x64
            artifact_name: QPyPack.exe
            package_extension: zip
          - os: macos-13
            arch: x64
            artifact_name: QPyPack.app
            package_extension: zip
          - os: macos-14
            arch: arm64
            artifact_name: QPyPack.app
            package_extension: zip
          - os: ubuntu-latest
            arch: x64
            artifact_name: QPyPack
            package_extension: tar.gz

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PySide6 Pillow pyinstaller

      - name: Build with PyInstaller
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            pyinstaller --onefile --noconsole --name=QPyPack --icon=qpypack/icon.ico qpypack/main.py
          elif [ "${{ runner.os }}" = "macOS" ]; then
            pyinstaller --onefile --noconsole --name=QPyPack --icon=qpypack/icon.ico qpypack/main.py
          else
            pyinstaller --onefile --noconsole --name=QPyPack qpypack/main.py
          fi

      # Windows 平台的标准打包格式 (使用 PowerShell Core)
      - name: Package Artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $VERSION = "${{ github.ref_name }}".TrimStart('v')
          $OUT_NAME = "QPyPack-$VERSION-windows-${{ matrix.arch }}"
          Compress-Archive -Path "dist/${{ matrix.artifact_name }}" -DestinationPath "$OUT_NAME.zip" -Force

      # macOS / Linux 平台的标准打包格式 (使用 Bash)
      - name: Package Artifact (macOS / Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          OS_NAME=$(echo "${{ runner.os }}" | tr '[:upper:]' '[:lower:]')
          OUT_NAME="QPyPack-${VERSION}-${OS_NAME}-${{ matrix.arch }}"
          cd dist
          if [ "${{ matrix.package_extension }}" = "zip" ]; then
            zip -r "../${OUT_NAME}.zip" "${{ matrix.artifact_name }}"
          else
            tar -czf "../${OUT_NAME}.tar.gz" "${{ matrix.artifact_name }}"
          fi

      - name: Upload Artifacts to Job
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.os }}-${{ matrix.arch }}
          path: QPyPack-*.*

  build-pypi-packages:
    name: Build PyPI Wheel and Sdist
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Build Packages
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Upload PyPI Artifacts to Job
        uses: actions/upload-artifact@v4
        with:
          name: pypi-packages
          path: dist/*

  create-release:
    name: Create GitHub Release
    needs: [build-binaries, build-pypi-packages]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Display Downloaded Files
        run: ls -R artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          fail_on_unmatched_files: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}