name: Build and Release

on:
  push:
    tags:
      - 'v*'

env:
  PROJECT_NAME: qpypack
  MAIN_SCRIPT: qpypack/main.py
  ICON_PATH: qpypack/icon.ico
  EXE_NAME_PREFIX: QPyPack
  BUILD_PIP_PACKAGE: true
  PUBLISH_TO_PYPI: true
  COMPANY_NAME: QwejayHuang
  PRODUCT_NAME: QPyPack
  LEGAL_COPYRIGHT: Copyright (C) QwejayHuang
  FILE_DESCRIPTION: Automation Python Packaging and Freezing Suite

jobs:
  build-pypi-packages:
    name: Build PyPI Wheel and Sdist
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Synchronize Version
        shell: python
        run: |
          import re
          import os
          
          tag = "${{ github.ref_name }}"
          version = tag[1:] if tag.lower().startswith('v') else tag 
          print(f"Target version to sync: {version}") 
          
          toml_path = 'pyproject.toml' 
          if os.path.exists(toml_path): 
              with open(toml_path, 'r', encoding='utf-8') as f: 
                  content = f.read() 
              new_content = re.sub(r'(version\s*=\s*["\'])[^"\']+(["\'])', f'\\g<1>{version}\\g<2>', content, count=1) 
              with open(toml_path, 'w', encoding='utf-8') as f: 
                  f.write(new_content) 
              print("Successfully synchronized pyproject.toml.") 
          
          main_path = os.environ['MAIN_SCRIPT'] 
          if os.path.exists(main_path): 
              with open(main_path, 'r', encoding='utf-8') as f: 
                  content = f.read() 
              new_content = re.sub(r'(__version__\s*=\s*["\'])[^"\']+(["\'])', f'\\g<1>{version}\\g<2>', content, count=1) 
              with open(main_path, 'w', encoding='utf-8') as f: 
                  f.write(new_content) 
              print(f"Successfully synchronized {main_path}.") 

      - name: Commit and Push Version Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          if [ -f "pyproject.toml" ]; then
            git add pyproject.toml "${{ env.MAIN_SCRIPT }}"
          else
            git add "${{ env.MAIN_SCRIPT }}"
          fi
          
          git commit -m "chore: bump version to ${{ github.ref_name }} [skip ci]" || echo "No version changes to commit"
          git push origin HEAD:main

      - name: Build Packages
        if: env.BUILD_PIP_PACKAGE == 'true'
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Upload PyPI Artifacts to Job
        if: env.BUILD_PIP_PACKAGE == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: pypi-packages
          path: dist/*

  build-binaries:
    name: Build Standalone for ${{ matrix.os }} (${{ matrix.arch }})
    needs: build-pypi-packages
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            arch: x64
            artifact_name: QPyPack.exe
            package_extension: zip
          - os: macos-14
            arch: arm64
            artifact_name: QPyPack.app
            package_extension: zip
          - os: ubuntu-latest
            arch: x64
            artifact_name: QPyPack
            package_extension: tar.gz

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PySide6 Pillow pyinstaller

      - name: Build with PyInstaller
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            pyinstaller --onefile --noconsole --name=${{ env.EXE_NAME_PREFIX }} --icon=${{ env.ICON_PATH }} ${{ env.MAIN_SCRIPT }}
          elif [ "${{ runner.os }}" = "macOS" ]; then
            pyinstaller --onefile --noconsole --name=${{ env.EXE_NAME_PREFIX }} --icon=${{ env.ICON_PATH }} ${{ env.MAIN_SCRIPT }}
          else
            pyinstaller --onefile --noconsole --name=${{ env.EXE_NAME_PREFIX }} ${{ env.MAIN_SCRIPT }}
          fi

      - name: Package Artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $VERSION = "${{ github.ref_name }}".TrimStart('v')
          $OUT_NAME = "${{ env.EXE_NAME_PREFIX }}-$VERSION-windows-${{ matrix.arch }}"
          Compress-Archive -Path "dist/${{ matrix.artifact_name }}" -DestinationPath "$OUT_NAME.zip" -Force

      - name: Package Artifact (macOS / Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          OS_NAME=$(echo "${{ runner.os }}" | tr '[:upper:]' '[:lower:]')
          OUT_NAME="${{ env.EXE_NAME_PREFIX }}-${VERSION}-${OS_NAME}-${{ matrix.arch }}"
          cd dist
          if [ "${{ matrix.package_extension }}" = "zip" ]; then
            zip -r "../${OUT_NAME}.zip" "${{ matrix.artifact_name }}"
          else
            tar -czf "../${OUT_NAME}.tar.gz" "${{ matrix.artifact_name }}"
          fi

      - name: Upload Artifacts to Job
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.os }}-${{ matrix.arch }}
          path: ${{ env.EXE_NAME_PREFIX }}-*.*

  create-release:
    name: Create GitHub Release
    needs: [build-binaries, build-pypi-packages]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Display Downloaded Files
        run: ls -R artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          fail_on_unmatched_files: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}